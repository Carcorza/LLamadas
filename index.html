<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Llamadas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 450px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; font-size: 22px; line-height: 1.3; }
        .subtitle { text-align: center; color: #999; margin-bottom: 25px; font-size: 12px; }
        #loginScreen { display: block; }
        #appScreen { display: none; }
        .user-badge { background: #e9ecef; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; color: #495057; font-size: 14px;}
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        select, textarea, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.3s; -webkit-appearance: none; }
        .filter-box { background: #f1f3f9; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #667eea; }
        .info-box { background: #f8f9fa; border-left: 4px solid #667eea; padding: 12px; margin-bottom: 20px; border-radius: 0 8px 8px 0; display: none; font-size: 14px; }
        button, .btn-call, .btn-link { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 10px; text-align: center; text-decoration: none; display: block; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-link { background: linear-gradient(135deg, #17a2b8 0%, #117a8b 100%); color: white; margin-bottom: 20px; }
        .btn-call { background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; display: none; }
        .btn-next { background: #28a745; color: white; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .loading { display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div id="loginScreen">
            <h1>🔒 Acceso al Sistema</h1>
            <form onsubmit="iniciarSesion(event)">
                <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" required></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass" required></div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </div>

        <div id="appScreen">
            <h1>📞 Contact center</h1>
            <div class="user-badge" id="displayUsuario"></div>
            <a href="https://docs.google.com/spreadsheets/d/1VUkxrVjr2P2_XZYGGnSk08SHGw4gvxQlRURVsEYryZI/edit?gid=0#gid=0" 
               target="_blank" id="btnBaseDatos" class="btn-link" style="display: none;">📊 Ver Base de Datos</a>

            <div class="filter-box">
                <label style="color: #764ba2;">🔍 Filtrar por Cargo</label>
                <select id="cargoFilter" onchange="aplicarFiltroCargo()" disabled><option>Cargando...</option></select>
            </div>

            <div class="form-group">
                <label>Seleccionar Candidato</label>
                <select id="contactoSelect" onchange="seleccionarContacto()" disabled><option>Cargando...</option></select>
            </div>
            
            <div class="info-box" id="infoBox">
                <p><strong>Cargo:</strong> <span id="lblCargo"></span></p>
                <p><strong>Documento:</strong> <span id="lblDoc"></span></p>
                <p><strong>Teléfono:</strong> <span id="lblTel"></span></p>
            </div>

            <a href="#" class="btn-call" id="btnCall" onclick="iniciarLlamada(event)">☎️ Iniciar Llamada</a>
            
            <div id="paso2" style="display:none;">
                <label>Observación</label><textarea id="observacion"></textarea>
                <label>Novedad</label><input type="text" id="novedad" value="Ok">
                <button class="btn-next" onclick="guardarYSiguiente()">Guardar ⏭️</button>
                <button class="btn-cancel" onclick="cancelarLlamada()">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxwONleXf8MMH1vQOTZIl04egU0QfQfOoQrZ27U7TmOvjCh_jcxRfbM-gr3___Jxdy5/exec'; // <--- CAMBIA ESTO
        let contactosData = [], contactosFiltrados = [], contactoActual = null, currentUser = "";

        function iniciarSesion(e) {
            e.preventDefault();
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "login", usuario: document.getElementById('loginUser').value, password: document.getElementById('loginPass').value }) })
            .then(res => res.json())
            .then(data => {
                if(data.resultado === 'exito') {
                    currentUser = data.usuario;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('appScreen').style.display = 'block';
                    document.getElementById('displayUsuario').textContent = "Usuario: " + currentUser;
                    if(data.mostrarLink) document.getElementById('btnBaseDatos').style.display = 'block';
                    cargarContactos();
                } else alert(data.mensaje);
            });
        }

        function cargarContactos() {
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                contactosData = data.sort(() => Math.random() - 0.5);
                contactosFiltrados = contactosData;
                actualizarSelectorCargos();
                refrescarListaLocal();
                document.getElementById('cargoFilter').disabled = false;
                document.getElementById('contactoSelect').disabled = false;
            });
        }

        function actualizarSelectorCargos() {
            let cargos = [...new Set(contactosData.map(c => c.cargo || "Sin cargo"))].sort();
            let html = '<option value="TODOS">🌍 -- VER TODOS LOS CARGOS --</option>';
            cargos.forEach(c => html += `<option value="${c}">${c}</option>`);
            document.getElementById('cargoFilter').innerHTML = html;
        }

        function aplicarFiltroCargo() {
            let val = document.getElementById('cargoFilter').value;
            contactosFiltrados = (val === "TODOS") ? contactosData : contactosData.filter(c => (c.cargo || "Sin cargo") === val);
            refrescarListaLocal();
        }

        function refrescarListaLocal() {
            let sel = document.getElementById('contactoSelect');
            sel.innerHTML = '<option value="">-- Selecciona --</option>';
            contactosFiltrados.forEach(c => sel.innerHTML += `<option value="${c.fila}">${c.nombre}</option>`);
        }

        function seleccionarContacto() {
            let val = document.getElementById('contactoSelect').value;
            if(!val) return;
            contactoActual = contactosFiltrados.find(c => c.fila == val);
            document.getElementById('lblCargo').textContent = contactoActual.cargo;
            document.getElementById('lblDoc').textContent = contactoActual.documento;
            document.getElementById('lblTel').textContent = contactoActual.telefono;
            document.getElementById('btnCall').href = "tel:" + contactoActual.telefono;
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('btnCall').style.display = 'block';
        }

        function iniciarLlamada(e) {
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('paso2').style.display = 'block';
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "bloquear", fila: contactoActual.fila }) });
        }

        function guardarYSiguiente() {
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "guardar", fila: contactoActual.fila, observacion: document.getElementById('observacion').value, novedad: document.getElementById('novedad').value }) })
            .then(() => location.reload());
        }

        function cancelarLlamada() {
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "desbloquear", fila: contactoActual.fila }) })
            .then(() => location.reload());
        }
    </script>
</body>
</html>
