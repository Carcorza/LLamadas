<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Llamadas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 450px; width: 100%; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; font-size: 24px; }
        .subtitle { text-align: center; color: #999; margin-bottom: 25px; font-size: 12px; }
        #loginScreen { display: block; }
        #appScreen { display: none; }
        .user-badge { background: #e9ecef; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; color: #495057; font-size: 14px;}
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        select, textarea, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.3s; }
        select:focus, textarea:focus, input:focus { outline: none; border-color: #667eea; }
        textarea { resize: vertical; min-height: 80px; }
        .info-box { background: #f8f9fa; border-left: 4px solid #667eea; padding: 12px; margin-bottom: 20px; border-radius: 0 8px 8px 0; display: none; font-size: 14px; }
        .info-box p { margin-bottom: 5px; color: #444; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 10px; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3); }
        .btn-call { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; display: none; }
        .btn-next { background: #28a745; color: white; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; display: none; }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        #paso2 { display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- PANTALLA DE LOGIN -->
        <div id="loginScreen">
            <h1>🔒 Acceso al Sistema</h1>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>
            
            <form id="loginForm" onsubmit="iniciarSesion(event)">
                <div class="form-group">
                    <label for="loginUser">Usuario</label>
                    <input type="text" id="loginUser" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="loginPass">Contraseña</label>
                    <input type="password" id="loginPass" name="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            
            <div id="loginMessage" class="message"></div>
            <div class="loading" id="loginLoading"><div class="spinner"></div><p style="margin-top: 10px;">Validando...</p></div>
        </div>

        <!-- PANTALLA PRINCIPAL (SIN FILTRO DE CARGO) -->
        <div id="appScreen">
            <h1>📞 Contact center</h1>
            <div class="user-badge" id="displayUsuario">Usuario: -</div>
            <p class="subtitle" id="estadoCarga">Cargando pacientes...</p>
            
            <form id="callForm">
                <div class="form-group">
                    <label for="contactoSelect">Seleccionar Paciente</label>
                    <select id="contactoSelect" onchange="seleccionarContacto()" disabled>
                        <option value="">Cargando datos...</option>
                    </select>
                </div>
                
                <div class="info-box" id="infoBox">
                    <p><strong>Documento:</strong> <span id="lblDoc"></span></p>
                    <p><strong>Teléfono:</strong> <span id="lblTel"></span></p>
                </div>

                <button type="button" class="btn-call" id="btnCall" onclick="iniciarLlamada()">☎️ Iniciar Llamada</button>
                
                <div id="paso2">
                    <div class="form-group">
                        <label style="color: #28a745; margin-bottom:10px;">
                            Llamada iniciada a las: <br><strong><span id="horaDisplay"></span></strong>
                        </label>
                        <label for="observacion">Observación</label>
                        <textarea id="observacion" placeholder="Ej: No contesta..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="novedad">Novedad</label>
                        <input type="text" id="novedad" value="Ok">
                    </div>
                    
                    <button type="button" class="btn-next" onclick="guardarYSiguiente()">Guardar y Finalizar ⏭️</button>
                    <button type="button" class="btn-cancel" onclick="cancelarLlamada()">Cancelar Llamada</button>
                </div>
            </form>
            
            <div id="appMessage" class="message"></div>
            <div class="loading" id="appLoading"><div class="spinner"></div><p id="loadingText" style="margin-top: 10px;">Procesando...</p></div>
        </div>
    </div>
    
    <script>
        // ⚠️ PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_NCzbTDgppL4X5kpRZyHpQXUBIqJVpyeu4mRB1Pc5yGmdMOCuZ7JzpesT9X2_uv5p/exec';
        
        let currentUser = ""; 
        let contactosData = [];
        let contactoActual = null;
        let horaLlamadaExacta = "";

        function iniciarSesion(event) {
            if(event) event.preventDefault();
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;
            if(!user || !pass) return;

            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('loginLoading').style.display = 'block';

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "login", usuario: user, password: pass }) })
            .then(res => res.json())
            .then(data => {
                document.getElementById('loginLoading').style.display = 'none';
                if(data.resultado === 'exito') {
                    currentUser = data.usuario;
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('appScreen').style.display = 'block';
                    document.getElementById('displayUsuario').textContent = `Usuario activo: ${currentUser}`;
                    cargarContactos(); 
                } else { 
                    mostrarMensaje('loginMessage', data.mensaje, 'error'); 
                }
            }).catch(e => {
                document.getElementById('loginLoading').style.display = 'none';
                mostrarMensaje('loginMessage', 'Error de conexión', 'error');
            });
        }

        function cargarContactos() {
            document.getElementById('estadoCarga').textContent = "Conectando con la base...";
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    contactosData = data;
                    const contactoSelect = document.getElementById('contactoSelect');
                    
                    if (data.length === 0) {
                        contactoSelect.innerHTML = '<option value="">Sin pendientes en la base</option>';
                        document.getElementById('estadoCarga').textContent = "¡Base terminada!";
                        return;
                    }

                    // Forma optimizada de cargar la lista para evitar que el celular colapse
                    let opciones = '<option value="">-- Selecciona un Paciente --</option>';
                    data.forEach(c => {
                        opciones += `<option value="${c.fila}">${c.nombre} - ${c.documento}</option>`;
                    });
                    
                    contactoSelect.innerHTML = opciones;
                    contactoSelect.disabled = false;
                    document.getElementById('estadoCarga').textContent = `Total pendientes: ${data.length}`;
                }).catch(e => {
                    document.getElementById('estadoCarga').textContent = "❌ Error cargando datos.";
                });
        }

        function seleccionarContacto() {
            const fila = parseInt(document.getElementById('contactoSelect').value);
            if (!fila) { reiniciarInterfaz(); return; }

            contactoActual = contactosData.find(c => c.fila === fila);
            document.getElementById('lblDoc').textContent = contactoActual.documento;
            document.getElementById('lblTel').textContent = contactoActual.telefono;
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('btnCall').style.display = 'block';
        }

        function iniciarLlamada() {
            if (!contactoActual) return;
            
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('loadingText').textContent = "Bloqueando contacto...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "bloquear", fila: contactoActual.fila, usuario_call: currentUser }) })
            .then(res => res.json())
            .then(data => {
                document.getElementById('appLoading').style.display = 'none';
                const fecha = new Date();
                horaLlamadaExacta = fecha.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit', hour12: true });
                document.getElementById('horaDisplay').textContent = horaLlamadaExacta;
                
                window.location.href = `tel:${contactoActual.telefono}`;
                
                document.getElementById('contactoSelect').disabled = true;
                document.getElementById('paso2').style.display = 'block';
            });
        }
        
        function guardarYSiguiente() {
            document.getElementById('loadingText').textContent = "Guardando...";
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('paso2').style.display = 'none'; 
            
            const payload = { 
                accion: "guardar", fila: contactoActual.fila, hora: horaLlamadaExacta, 
                observacion: document.getElementById('observacion').value, 
                novedad: document.getElementById('novedad').value, usuario_call: currentUser 
            };
            
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(data => {
                document.getElementById('appLoading').style.display = 'none';
                mostrarMensaje('appMessage', '✅ Guardado exitoso.', 'success');
                
                // Actualiza la lista sin recargar toda la página
                contactosData = contactosData.filter(c => c.fila !== contactoActual.fila);
                setTimeout(() => {
                    document.getElementById('appMessage').style.display = 'none';
                    refrescarListaLocal();
                    reiniciarInterfaz();
                }, 1500);
            });
        }

        function cancelarLlamada() {
            if(!contactoActual) return;
            document.getElementById('paso2').style.display = 'none';
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('loadingText').textContent = "Liberando contacto...";

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "desbloquear", fila: contactoActual.fila }) })
            .then(() => {
                document.getElementById('appLoading').style.display = 'none';
                reiniciarInterfaz();
            });
        }

        function refrescarListaLocal() {
            const contactoSelect = document.getElementById('contactoSelect');
            let opciones = '<option value="">-- Selecciona un Paciente --</option>';
            contactosData.forEach(c => { opciones += `<option value="${c.fila}">${c.nombre} - ${c.documento}</option>`; });
            contactoSelect.innerHTML = opciones;
            document.getElementById('estadoCarga').textContent = `Total pendientes: ${contactosData.length}`;
        }

        function reiniciarInterfaz() {
            document.getElementById('contactoSelect').disabled = false;
            document.getElementById('contactoSelect').value = "";
            document.getElementById('infoBox').style.display = 'none';
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('paso2').style.display = 'none';
            document.getElementById('observacion').value = "";
            document.getElementById('novedad').value = "Ok";
            contactoActual = null;
            horaLlamadaExacta = "";
        }
        
        function mostrarMensaje(elementId, texto, tipo) {
            const m = document.getElementById(elementId);
            m.textContent = texto; m.className = `message ${tipo}`;
        }
    </script>
</body>
</html>
