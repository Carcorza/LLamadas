<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Llamadas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); max-width: 450px; width: 100%; position: relative; }
        h1 { color: #333; margin-bottom: 10px; text-align: center; font-size: 20px; line-height: 1.3; }
        .subtitle { text-align: center; color: #999; margin-bottom: 25px; font-size: 12px; }
        #loginScreen { display: block; }
        #appScreen { display: none; }
        .user-badge { background: #e9ecef; padding: 8px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-weight: bold; color: #495057; font-size: 14px;}
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #555; font-weight: 600; margin-bottom: 8px; font-size: 13px; }
        select, textarea, input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; transition: border-color 0.3s; }
        select:focus, textarea:focus, input:focus { outline: none; border-color: #667eea; }
        .filter-box { background: #f1f3f9; padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed #667eea; }
        .info-box { background: #f8f9fa; border-left: 4px solid #667eea; padding: 12px; margin-bottom: 20px; border-radius: 0 8px 8px 0; display: none; font-size: 14px; }
        .info-box p { margin-bottom: 5px; color: #444; }
        button, .btn-call, .btn-link { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; margin-bottom: 10px; text-align: center; text-decoration: none; display: block; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-link { background: linear-gradient(135deg, #17a2b8 0%, #117a8b 100%); color: white; margin-bottom: 20px; }
        .btn-call { background: linear-gradient(135deg, #28a745 0%, #218838 100%); color: white; display: none; }
        .btn-abort { background: #dc3545; color: white; display: none; } 
        .btn-next { background: #28a745; color: white; }
        .btn-cancel { background: #f0f0f0; color: #666; }
        .message { margin-top: 15px; padding: 12px; border-radius: 8px; text-align: center; font-size: 13px; display: none; }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .loading { display: none; text-align: center; margin-top: 15px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #667eea; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .search-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            z-index: 10;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(2px);
        }
        .search-overlay p { margin-top: 12px; font-weight: 600; color: #764ba2; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="searchLoading" class="search-overlay">
            <div class="spinner"></div>
            <p id="overlayText">Buscando...</p>
        </div>

        <!-- PANTALLA DE LOGIN -->
        <div id="loginScreen">
            <h1>🔒 Acceso al Sistema</h1>
            <p class="subtitle">Ingresa tus credenciales para continuar</p>
            <form onsubmit="iniciarSesion(event)">
                <div class="form-group"><label>Usuario</label><input type="text" id="loginUser" required></div>
                <div class="form-group"><label>Contraseña</label><input type="password" id="loginPass" required></div>
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            <div id="loginMessage" class="message"></div>
            <div class="loading" id="loginLoading"><div class="spinner"></div><p style="margin-top:10px;">Validando y cargando base de datos...</p></div>
        </div>

        <!-- PANTALLA PRINCIPAL -->
        <div id="appScreen">
            <h1>📞 Contact Center</h1>
            <div class="user-badge" id="displayUsuario"></div>
            
            <a href="#" target="_blank" id="btnBaseDatos" class="btn-link" style="display: none;">📊 Ver Base de Datos</a>

            <div class="filter-box">
                <label style="color: #764ba2;">🔍 Filtrar por Cargo</label>
                <select id="cargoFilter" onchange="aplicarFiltroCargo()" disabled><option>Cargando cargos...</option></select>
            </div>

            <div class="form-group">
                <label>🔍 Buscar por Cédula, Celular o Nombre (ej: car co za)</label>
                <input type="text" id="searchBar" placeholder="Escribe cédula, celular o nombre..." oninput="debounceBuscar()" disabled>
            </div>

            <div class="form-group">
                <label>Seleccionar Candidato</label>
                <select id="contactoSelect" onchange="seleccionarContacto()" disabled><option>Cargando candidatos...</option></select>
            </div>
            
            <div class="info-box" id="infoBox">
                <p><strong>Cargo:</strong> <span id="lblCargo" style="color: #764ba2; font-weight: bold;"></span></p>
                <p><strong>Documento:</strong> <span id="lblDoc"></span></p>
                <p><strong>Teléfono:</strong> <span id="lblTel"></span></p>
            </div>

            <!-- BOTONES DE ACCIÓN -->
            <a href="#" class="btn-call" id="btnCall" onclick="iniciarLlamada(event)">☎️ Iniciar Llamada</a>
            <button type="button" class="btn-abort" id="btnAbort" onclick="abortarSeleccion()">❌ Cancelar Gestión</button>
            
            <div id="paso2" style="display:none;">
                <div class="form-group">
                    <label style="color: #28a745; margin-bottom:10px;">Llamada en progreso a las: <br><strong><span id="horaDisplay"></span></strong></label>
                    <label>Observación</label>
                    <textarea id="observacion" placeholder="Escribe aquí los comentarios de la llamada..."></textarea>
                </div>
                <div class="form-group" style="display: none;">
                    <label>Novedad</label>
                    <input type="text" id="novedad" value="Ok">
                </div>
                <button type="button" class="btn-next" onclick="guardarYSiguiente()">Guardar y Finalizar ⏭️</button>
                <button type="button" class="btn-cancel" onclick="cancelarLlamada()">Cancelar Llamada</button>
            </div>
            
            <div id="appMessage" class="message"></div>
            <div class="loading" id="appLoading"><div class="spinner"></div><p id="loadingText" style="margin-top: 10px;">Procesando...</p></div>
        </div>
    </div>
    
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzzl1vNLFAYSijGLKxJCjnXhj5SKUjubtAC66GXidktKDJ2_Zr4irPiJE2jKZpLjb7k/exec';
        
        let contactosData = [], contactosFiltrados = [], contactoActual = null, currentUser = "";
        let horaLlamadaExacta = "";
        let debounceTimer;

        function iniciarSesion(e) {
            e.preventDefault();
            document.getElementById('loginMessage').style.display = 'none';
            document.getElementById('loginLoading').style.display = 'block';

            // OPTIMIZACIÓN 1: El login ahora solicita explícitamente los contactos de inmediato
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ 
                    accion: "login", 
                    usuario: document.getElementById('loginUser').value, 
                    password: document.getElementById('loginPass').value,
                    cargarDatosInmediato: true // Flag opcional para sugerir unificación de carga en tu Apps Script
                }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.resultado === 'exito') {
                    currentUser = data.usuario;
                    document.getElementById('displayUsuario').textContent = "Usuario activo: " + currentUser;
                    if(data.mostrarLink && data.urlBaseDatos) {
                        const btnDb = document.getElementById('btnBaseDatos');
                        btnDb.href = data.urlBaseDatos;
                        btnDb.style.display = 'block';
                    }
                    
                    // Pasamos directamente a la descarga de la lista sin re-autenticar
                    ejecutarDescargaContactos();
                } else {
                    document.getElementById('loginLoading').style.display = 'none';
                    let msg = document.getElementById('loginMessage');
                    msg.textContent = data.mensaje;
                    msg.className = "message error";
                }
            }).catch(err => {
                document.getElementById('loginLoading').style.display = 'none';
                alert("Error de conexión al validar credenciales.");
            });
        }

        function ejecutarDescargaContactos() {
            fetch(SCRIPT_URL)
            .then(res => res.json())
            .then(data => {
                // OPTIMIZACIÓN 2: Mezcla rápida óptima para grandes volúmenes
                contactosData = data.sort(() => 0.5 - Math.random()); 
                contactosFiltrados = contactosData;
                
                actualizarSelectorCargos();
                refrescarListaLocal(contactosFiltrados);
                
                document.getElementById('loginLoading').style.display = 'none';
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                
                document.getElementById('cargoFilter').disabled = false;
                document.getElementById('searchBar').disabled = false;
                document.getElementById('contactoSelect').disabled = false;
            }).catch(err => {
                document.getElementById('loginLoading').style.display = 'none';
                alert("Error cargando la lista de candidatos.");
            });
        }

        function actualizarSelectorCargos() {
            let cargos = [...new Set(contactosData.map(c => c.cargo ? String(c.cargo).trim() : "Sin cargo"))].sort();
            let html = '<option value="TODOS">🌍 -- VER TODOS LOS CARGOS --</option>';
            cargos.forEach(c => html += `<option value="${c}">${c}</option>`);
            document.getElementById('cargoFilter').innerHTML = html;
        }

        function aplicarFiltroCargo() {
            document.getElementById('searchBar').value = ""; 
            let val = document.getElementById('cargoFilter').value;
            contactosFiltrados = (val === "TODOS") ? contactosData : contactosData.filter(c => (c.cargo ? String(c.cargo).trim() : "Sin cargo") === val);
            refrescarListaLocal(contactosFiltrados);
            reiniciarInterfaz(false);
        }

        function debounceBuscar() {
            document.getElementById('overlayText').textContent = "Buscando coincidencias...";
            document.getElementById('searchLoading').style.display = 'flex';
            
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                filtrarPorTexto();
            }, 250); // Reducido a 250ms para mayor sensación de velocidad táctil
        }

        function filtrarPorTexto() {
            let query = document.getElementById('searchBar').value.trim().toLowerCase();
            if (!query) {
                refrescarListaLocal(contactosFiltrados);
                document.getElementById('searchLoading').style.display = 'none';
                return;
            }

            let partes = query.split(/\s+/);
            let regexString = "^" + partes.map(p => p.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')).join(".*?\\b");
            let regexNombre = new RegExp(regexString, "i");

            let resultados = contactosFiltrados.filter(c => {
                let nombre = c.nombre ? String(c.nombre).trim().toLowerCase() : "";
                let documento = c.documento ? String(c.documento).trim() : "";
                let telefono = c.telefono ? String(c.telefono).trim() : ""; 
                
                return documento.includes(query) || telefono.includes(query) || regexNombre.test(nombre);
            });

            refrescarListaLocal(resultados);
            document.getElementById('searchLoading').style.display = 'none';
        }

        function refrescarListaLocal(datosAMostrar) {
            let sel = document.getElementById('contactoSelect');
            if(datosAMostrar.length === 0){
                sel.innerHTML = '<option value="">Sin referencias u coincidencias</option>';
                return;
            }
            
            // OPTIMIZACIÓN 3: Renderizado por fragmentos de texto en lugar de concatenación masiva de strings lenta
            let fragmento = `<option value="">-- Selecciona un Candidato (${datosAMostrar.length}) --</option>`;
            
            // Si la lista filtrada es inmensa (ej. 10,000+), limitamos la vista previa inicial en el select para no colgar el móvil
            let limiteMaximo = datosAMostrar.length > 800 ? datosAMostrar.slice(0, 800) : datosAMostrar;
            
            limiteMaximo.forEach(c => {
                fragmento += `<option value="${c.fila}">${c.nombre}</option>`;
            });
            
            if(datosAMostrar.length > 800) {
                fragmento += `<option value="" disabled>...Use la barra de búsqueda para ver los restantes...</option>`;
            }
            
            sel.innerHTML = fragmento;
        }

        function seleccionarContacto() {
            let val = document.getElementById('contactoSelect').value;
            if(!val) { reiniciarInterfaz(false); return; }
            
            contactoActual = contactosData.find(c => c.fila == val);
            document.getElementById('lblCargo').textContent = contactoActual.cargo || "No especificado";
            document.getElementById('lblDoc').textContent = contactoActual.documento;
            document.getElementById('lblTel').textContent = contactoActual.telefono;
            document.getElementById('btnCall').href = "tel:" + contactoActual.telefono;
            
            document.getElementById('infoBox').style.display = 'block';
            document.getElementById('btnCall').style.display = 'block';
            document.getElementById('btnAbort').style.display = 'block'; 
        }

        function iniciarLlamada(e) {
            if(!contactoActual) return;
            let fecha = new Date();
            horaLlamadaExacta = fecha.toLocaleString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit', hour12: true });
            document.getElementById('horaDisplay').textContent = horaLlamadaExacta;
            
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('btnAbort').style.display = 'none'; 
            document.getElementById('contactoSelect').disabled = true;
            document.getElementById('cargoFilter').disabled = true;
            document.getElementById('searchBar').disabled = true; 
            document.getElementById('paso2').style.display = 'block';
            
            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "bloquear", fila: contactoActual.fila, usuario_call: currentUser }) });
        }

        function abortarSeleccion() {
            if(!contactoActual) return;
            document.getElementById('loadingText').textContent = "Liberando...";
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('btnAbort').style.display = 'none';

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "desbloquear", fila: contactoActual.fila }) })
            .then(() => {
                document.getElementById('appLoading').style.display = 'none';
                reiniciarInterfaz(true); 
            });
        }

        function guardarYSiguiente() {
            document.getElementById('loadingText').textContent = "Guardando...";
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('paso2').style.display = 'none';

            let payload = {
                accion: "guardar",
                fila: contactoActual.fila,
                hora: horaLlamadaExacta,
                observacion: document.getElementById('observacion').value,
                novedad: document.getElementById('novedad').value, 
                usuario_call: currentUser
            };

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(res => res.json())
            .then(() => {
                document.getElementById('appLoading').style.display = 'none';
                
                contactosData = contactosData.filter(c => c.fila !== contactoActual.fila);
                let filtroActual = document.getElementById('cargoFilter').value;
                contactosFiltrados = (filtroActual === "TODOS") ? contactosData : contactosData.filter(c => (c.cargo ? String(c.cargo).trim() : "Sin cargo") === filtroActual);
                
                document.getElementById('searchBar').value = ""; 
                refrescarListaLocal(contactosFiltrados);
                reiniciarInterfaz(true);
            });
        }

        function cancelarLlamada() {
            document.getElementById('loadingText').textContent = "Liberando...";
            document.getElementById('appLoading').style.display = 'block';
            document.getElementById('paso2').style.display = 'none';

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ accion: "desbloquear", fila: contactoActual.fila }) })
            .then(() => {
                document.getElementById('appLoading').style.display = 'none';
                reiniciarInterfaz(true);
            });
        }

        function reiniciarInterfaz(desbloquearFiltros) {
            if(desbloquearFiltros) {
                document.getElementById('cargoFilter').disabled = false;
                document.getElementById('searchBar').disabled = false;
                document.getElementById('contactoSelect').disabled = false;
            }
            document.getElementById('contactoSelect').value = "";
            document.getElementById('infoBox').style.display = 'none';
            document.getElementById('btnCall').style.display = 'none';
            document.getElementById('btnAbort').style.display = 'none'; 
            document.getElementById('btnCall').href = "#";
            document.getElementById('paso2').style.display = 'none';
            document.getElementById('observacion').value = "";
            document.getElementById('novedad').value = "Ok"; 
            contactoActual = null;
            horaLlamadaExacta = "";
        }
    </script>
</body>
</html>
